name: CI/CD → Build & GitOps Update

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ronco-java
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/ronco-java

jobs:
  # ─────────────────────────────
  # JOB 1: Build & Push Docker image
  # ─────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate short 7-char SHA tag
      - id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Generated tag: $SHORT_SHA"

      - uses: docker/build-push-action@v5
        with:
          context: bangla
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────
  # JOB 2: Update values.yaml with new SHA tag
  # ─────────────────────────────
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ FIXED: sed now targets the `tag:` line directly in values.yaml
      - name: Update image tag in values.yaml
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          echo "Updating tag to: $NEW_TAG"

          # Replace the tag line (handles quoted and unquoted values)
          sed -i "s|  tag:.*|  tag: \"$NEW_TAG\"|" my-app/values.yaml

          # Verify the change
          echo "--- Updated values.yaml image section ---"
          grep -A4 "^image:" my-app/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-app/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit — tag may already be up to date"
          else
            git commit -m "ci: bump image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      # Optional: force ArgoCD sync if you have cluster access
      # - name: Force ArgoCD sync
      #   run: argocd app sync my-app --auth-token ${{ secrets.ARGOCD_TOKEN }}
