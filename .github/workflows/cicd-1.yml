# ------------------ Workflow Definition ------------------
name: CI/CD Main - Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ronco-java
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/ronco-java

jobs:

  # ─────────────────────────────────────────────────────
  # JOB 1: SonarQube Code Scan
  # ─────────────────────────────────────────────────────
  sonarqube-scan:
    runs-on: ubuntu-latest
    steps:

      # ------------------ Checkout Code ------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------ SonarQube Scan ------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: bangla

      # ------------------ Quality Gate Check ------------------
      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: bangla/.scannerwork/report-task.txt


  # ─────────────────────────────────────────────────────
  # JOB 2: Build, Test, Scan & Push Docker Image
  # ─────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:

      # ------------------ Checkout Code ------------------
      - uses: actions/checkout@v4

      # ------------------ Setup Docker Buildx ------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------ Login to DockerHub ------------------
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------ Login to GHCR ------------------
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------ Generate Image Tag ------------------
      - id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Generated tag: $SHORT_SHA"

      # ------------------ Upload Test Reports ------------------
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: Multi-Tier-BankApp/target/surefire-reports/

      # ------------------ Trivy Filesystem Scan ------------------
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-report.txt'

      # ------------------ Upload Trivy Report ------------------
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-report.txt

      # ------------------ Build & Push Docker Image ------------------
      - uses: docker/build-push-action@v5
        with:
          context: bangla
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ─────────────────────────────────────────────────────
  # JOB 3: Update values.yaml with New SHA Tag
  # ─────────────────────────────────────────────────────
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:

      # ------------------ Checkout Code ------------------
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------ Update Image Tag in values.yaml ------------------
      - name: Update image tag in values.yaml
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Updating tag to: $NEW_TAG"
          sed -i "s|  tag:.*|  tag: \"$NEW_TAG\"|" my-app/values.yaml
          echo "--- Updated values.yaml image section ---"
          grep -A4 "^image:" my-app/values.yaml

      # ------------------ Commit & Push Updated Manifest ------------------
      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-app/values.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit — tag may already be up to date"
          else
            git commit -m "ci: bump image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
