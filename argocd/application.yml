apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: frontend-my-app            # default project name changing
  namespace: argocd
spec:
  description: Frontend project
  sourceRepos:
    - https://github.com/aorko16/Helm-Argocd-multi-env-03.git  # ✅ FIXED repo
  destinations:
    - namespace: my-app
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io   # Cascade-delete on removal
spec:
  project: frontend-my-app                # match project name
  source:
    repoURL: https://github.com/aorko16/Helm-Argocd-multi-env-03.git  # ✅ FIXED repo
    targetRevision: main
    path: my-app                           # created by helm chart
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true              # auto namespace
      - PrunePropagationPolicy=foreground # child resource delete then parent
      - PruneLast=true                    # create new resource, old delete
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m                   # 3 minutes
