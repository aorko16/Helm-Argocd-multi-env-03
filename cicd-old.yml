

# ─────────────────────────────
name: CI/CD → Build & GitOps Update
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ronco-bangla

jobs:
  # ─────────────────────────────
  # JOB 1: Build & Push Docker image
  # ─────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Setup Docker Buildx for multi-platform builds
      - uses: docker/setup-buildx-action@v3

      # Login to DockerHub using secrets
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate a short 7-character SHA tag from the commit hash
      - id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      # Build & push Docker image to DockerHub
      # ✅ FIX: "context: bangla/ ." had a space — was an invalid path
      #         Fixed to "context: bangla" so Docker correctly finds bangla/Dockerfile
      - uses: docker/build-push-action@v5
        with:
          context: bangla
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────
  # JOB 2: Update Deployment manifest
  # ─────────────────────────────
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Checkout repo with write permission to push changes later
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Use sed to find the old image tag line and replace with the new tag
      # ✅ No change here — working correctly
      - run: |
          IMAGE_LINE="image: ${{ env.IMAGE_NAME }}:.*"
          NEW_IMAGE="image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|$IMAGE_LINE|$NEW_IMAGE|" my-app/values.yaml

      # Commit and push the updated values.yaml back to main branch
      # If nothing changed, skip the commit to avoid empty commits
      # ✅ No change here — working correctly
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-app/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: bump image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      # Optional: restart the Kubernetes deployment when cluster access is configured
      - run: |
          echo "Optional: Uncomment kubectl rollout if cluster access is available"
          # kubectl -n gitops-demo rollout restart deployment/ronco-bangla
